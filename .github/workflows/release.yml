name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  # Keep this in sync with `src-tauri/Cargo.toml` (`rust-version`).
  RUST_VERSION: '1.88.0'

permissions:
  contents: read

# Signing Environment Variables (set via GitHub Secrets):
#
# Required for automatic updates:
#   TAURI_SIGNING_PRIVATE_KEY - Tauri updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - Tauri updater key password, if any
#
# Future optional OS code signing:
# Windows Authenticode:
#   WINDOWS_CERTIFICATE - Base64-encoded PFX certificate file
#   WINDOWS_CERTIFICATE_PASSWORD - PFX password
#   WINDOWS_CERTIFICATE_NAME - Certificate subject name (e.g., "OpenReelio")
#
# macOS Notarization:
#   APPLE_CERTIFICATE - Base64-encoded P12 certificate file
#   APPLE_CERTIFICATE_PASSWORD - P12 password
#   APPLE_ID - Apple ID email
#   APPLE_ID_PASSWORD - App-specific password (generate at appleid.apple.com)
#   APPLE_TEAM_ID - Apple Developer Team ID
#   APPLE_SIGNING_IDENTITY - Certificate identity (e.g., "Developer ID Application: OpenReelio")

jobs:
  validate-release-version:
    name: Validate Release Version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify tag and project versions
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) must match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

          npm run version:check

  create-release:
    name: Create Release
    needs: validate-release-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG="$(git tag --merged "$CURRENT_TAG" --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
            COMPARE_URL="https://github.com/${REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          else
            RANGE="$CURRENT_TAG"
            COMPARE_URL="https://github.com/${REPOSITORY}/commits/${CURRENT_TAG}"
          fi

          GENERATE_ARGS=(-f "tag_name=${CURRENT_TAG}" -f "target_commitish=${{ github.sha }}")
          if [ -n "$PREVIOUS_TAG" ]; then
            GENERATE_ARGS+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          if gh api "repos/${REPOSITORY}/releases/generate-notes" "${GENERATE_ARGS[@]}" > generated-release-notes.json; then
            RELEASE_TITLE="$(jq -r --arg tag "$CURRENT_TAG" '.name // "Release \($tag)"' generated-release-notes.json)"
            jq -r '.body // ""' generated-release-notes.json > generated-release-notes.md
          else
            echo "GitHub generated release notes failed; falling back to commit history."
            RELEASE_TITLE="Release ${CURRENT_TAG}"
            : > generated-release-notes.md
          fi

          if git log "$RANGE" --pretty=format:'- %s (%h) by %an' > commit-history.md; then
            :
          else
            echo "- No commit history available for ${RANGE}." > commit-history.md
          fi

          if git shortlog -sne "$RANGE" > contributors.raw && [ -s contributors.raw ]; then
            sed -E 's/^[[:space:]]*[0-9]+[[:space:]]+(.+)$/- \1/' contributors.raw > contributors.md
          else
            echo "- No contributor data available for ${RANGE}." > contributors.md
          fi

          {
            cat generated-release-notes.md
            echo
            echo "## Commit History"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
            else
              echo "Initial release commit history:"
            fi
            echo
            cat commit-history.md
            echo
            echo "## Contributors"
            echo
            echo "Thank you to everyone who contributed commits to this release:"
            echo
            cat contributors.md
            echo
            echo "## Full Changelog"
            echo
            echo "${COMPARE_URL}"
            echo
            echo "## Downloads"
            echo
            echo "Installers and updater assets are attached to this release after CI finishes."
          } > release-notes.md

          PRERELEASE_FLAG=""
          if [[ "${{ contains(github.ref_name, '-') }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" > release.json 2>/dev/null; then
            echo "Release ${{ github.ref_name }} already exists; updating generated notes."
            gh release edit "${{ github.ref_name }}" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md
            gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" > release.json
          else
            gh release create "${{ github.ref_name }}" \
              --draft \
              $PRERELEASE_FLAG \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md
            gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" > release.json
          fi

          echo "id=$(jq -r '.id' release.json)" >> "$GITHUB_OUTPUT"
          echo "upload_url=$(jq -r '.upload_url' release.json)" >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build (${{ matrix.platform }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-arm
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Clear stale bundled runtime tools
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          find src-tauri/binaries -maxdepth 1 -type f \
            \( -name 'ffmpeg*' -o -name 'ffprobe*' -o -name 'openreelio-cli*' \) \
            -delete

      - name: Download FFmpeg binaries for target platform
        working-directory: src-tauri
        env:
          OPENREELIO_DOWNLOAD_FFMPEG: '1'
          # Current upstream FFmpeg URLs are mutable. Keep this explicit so the
          # release job does not pretend these downloads are checksum-pinned.
          OPENREELIO_ALLOW_UNVERIFIED_FFMPEG: '1'
        run: cargo build --release --target ${{ matrix.target }}
        timeout-minutes: 15

      - name: Build bundled OpenReelio CLI
        shell: bash
        run: |
          cargo build --release -p openreelio-cli --target ${{ matrix.target }}

          CLI_NAME="openreelio-cli"
          if [ "${{ runner.os }}" = "Windows" ]; then
            CLI_NAME="openreelio-cli.exe"
          fi

          CLI_PATH="target/${{ matrix.target }}/release/${CLI_NAME}"
          if [ ! -f "$CLI_PATH" ]; then
            echo "Missing built CLI binary: $CLI_PATH" >&2
            exit 1
          fi

          cp "$CLI_PATH" "src-tauri/binaries/${CLI_NAME}"

      - name: Verify bundled runtime tools
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            FFMPEG="src-tauri/binaries/ffmpeg.exe"
            FFPROBE="src-tauri/binaries/ffprobe.exe"
            OPENREELIO_CLI="src-tauri/binaries/openreelio-cli.exe"
          else
            FFMPEG="src-tauri/binaries/ffmpeg"
            FFPROBE="src-tauri/binaries/ffprobe"
            OPENREELIO_CLI="src-tauri/binaries/openreelio-cli"
          fi

          "$FFMPEG" -version
          "$FFPROBE" -version
          "$OPENREELIO_CLI" --version

          echo "Bundled runtime tools:"
          ls -la src-tauri/binaries/

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify version files
        run: npm run version:check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENREELIO_ENABLE_UPDATER: '1'
          # Updater signing key (required for auto-update)
          # Generate with: npx tauri signer generate -w ~/.tauri/openreelio.key
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: >-
            --target ${{ matrix.target }}
            --config '{"bundle":{"createUpdaterArtifacts":true}}'
          # Generate updater JSON artifacts
          updaterJsonPreferNsis: true

  generate-update-manifest:
    name: Generate Update Manifest
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts info
        id: get-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          MANIFEST="$(node <<'NODE'
          const [owner, repo] = process.env.REPOSITORY.split('/');
          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
            'X-GitHub-Api-Version': '2022-11-28',
          };

          async function githubJson(path) {
            const response = await fetch(`https://api.github.com${path}`, { headers });
            if (!response.ok) {
              throw new Error(`${path} failed: ${response.status} ${response.statusText}`);
            }
            return response.json();
          }

          const release = await githubJson(`/repos/${owner}/${repo}/releases/${process.env.RELEASE_ID}`);
          const assets = release.assets;
          const version = release.tag_name.replace(/^v/, '');
          const notes = release.body || '';
          const pub_date = release.published_at || new Date().toISOString();

          async function fetchSignature(sigAsset, assetName) {
            if (!sigAsset) {
              throw new Error(`No signature file found for ${assetName}`);
            }
            const response = await fetch(sigAsset.browser_download_url, { headers });
            if (!response.ok) {
              throw new Error(`Failed to download signature for ${assetName}: ${response.statusText}`);
            }
            const signature = (await response.text()).trim();
            if (!signature) {
              throw new Error(`Signature file is empty for ${assetName}`);
            }
            return signature;
          }

          const candidates = {
            windowsNsis: null,
            windowsMsi: null,
            darwinX64: null,
            darwinArm64: null,
            linuxX64: null,
          };

          for (const asset of assets) {
            const name = asset.name.toLowerCase();
            if (name.endsWith('.sig')) {
              continue;
            }

            if (name.endsWith('.exe') && (name.includes('setup') || name.includes('nsis'))) {
              candidates.windowsNsis = asset;
            } else if (name.endsWith('.msi')) {
              candidates.windowsMsi = asset;
            } else if (name.includes('x64') && name.endsWith('.app.tar.gz')) {
              candidates.darwinX64 = asset;
            } else if (name.includes('aarch64') && name.endsWith('.app.tar.gz')) {
              candidates.darwinArm64 = asset;
            } else if (name.endsWith('.appimage')) {
              candidates.linuxX64 = asset;
            }
          }

          const platforms = {};
          async function addPlatform(platform, asset) {
            if (!asset) {
              return;
            }
            const sigAsset = assets.find((a) => a.name === asset.name + '.sig');
            platforms[platform] = {
              signature: await fetchSignature(sigAsset, asset.name),
              url: asset.browser_download_url,
            };
          }

          await addPlatform('windows-x86_64', candidates.windowsNsis || candidates.windowsMsi);
          await addPlatform('darwin-x86_64', candidates.darwinX64);
          await addPlatform('darwin-aarch64', candidates.darwinArm64);
          await addPlatform('linux-x86_64', candidates.linuxX64);

          const requiredPlatforms = ['windows-x86_64', 'darwin-x86_64', 'darwin-aarch64', 'linux-x86_64'];
          const missingPlatforms = requiredPlatforms.filter((platform) => !platforms[platform]?.signature);
          if (missingPlatforms.length > 0) {
            throw new Error(`Missing signed updater artifacts for: ${missingPlatforms.join(', ')}`);
          }

          process.stdout.write(JSON.stringify({ version, notes, pub_date, platforms }, null, 2));
          NODE
          )"
          {
            echo 'result<<EOF'
            echo "$MANIFEST"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create latest.json
        run: |
          echo '${{ steps.get-release.outputs.result }}' > latest.json
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" latest.json --clobber

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri, generate-update-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
